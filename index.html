<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard de contenidos</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Segoe UI, Roboto, sans-serif;
      color: #111827;
      background: #f5f5f7;
      --card: rgba(255,255,255,.78);
      --line: rgba(17,24,39,.08);
      --text-soft: #667085;
      --blue: #007aff;
      --shadow: 0 24px 70px rgba(17,24,39,.10);
      --radius-xl: 28px;
      --radius-lg: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,122,255,.18), transparent 34rem),
        radial-gradient(circle at top right, rgba(175,82,222,.16), transparent 32rem),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 52%, #eef1f6 100%);
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 34px 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 26px; }
    .eyebrow { color: var(--blue); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; font-size: 12px; margin: 0 0 10px; }
    h1 { margin: 0; font-size: clamp(34px, 5vw, 64px); line-height: .98; letter-spacing: -.055em; }
    .subtitle { max-width: 680px; margin: 14px 0 0; color: var(--text-soft); font-size: 18px; line-height: 1.45; }
    .sheet-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      min-width: max-content; padding: 12px 16px; border-radius: 999px;
      color: white; background: #111827; text-decoration: none; font-weight: 700;
      box-shadow: 0 14px 30px rgba(17,24,39,.18); transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .sheet-btn:hover { transform: translateY(-1px); background: #000; box-shadow: 0 18px 38px rgba(17,24,39,.22); }
    .panel {
      background: var(--card); border: 1px solid rgba(255,255,255,.75); border-radius: var(--radius-xl);
      padding: 18px; box-shadow: var(--shadow); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    }
    .filters { display:grid; grid-template-columns: 1.7fr repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    input, select {
      width:100%; appearance: none; border: 1px solid var(--line); border-radius: 16px;
      background: rgba(255,255,255,.82); color: #111827; padding: 13px 14px; outline: none;
      font: inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,.75);
    }
    input:focus, select:focus { border-color: rgba(0,122,255,.55); box-shadow: 0 0 0 4px rgba(0,122,255,.12); }
    .status-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding: 0 4px 14px; }
    .muted { color: var(--text-soft); }
    .table-card { overflow: hidden; border: 1px solid var(--line); border-radius: 22px; background: rgba(255,255,255,.70); }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding: 16px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tr:last-child td { border-bottom: 0; }
    th { font-size: 12px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; letter-spacing: .045em; background: rgba(249,250,251,.72); }
    tbody tr { transition: background .16s ease; }
    tbody tr:hover { background: rgba(0,122,255,.045); }
    a { color: var(--blue); text-decoration: none; font-weight: 650; }
    a:hover { text-decoration: underline; }
    details summary { cursor:pointer; color: var(--blue); font-weight: 700; }
    details p { line-height: 1.48; }
    .badge { display:inline-flex; align-items:center; padding: 6px 10px; border-radius: 999px; background: rgba(0,122,255,.10); color: #0057c2; font-size: 12px; font-weight: 800; }
    .platform { color:#344054; font-weight:650; }
    @media (max-width: 900px) {
      .topbar { align-items:flex-start; flex-direction: column; }
      .filters { grid-template-columns: 1fr; }
      .panel { padding: 14px; border-radius: 22px; }
      table, thead, tbody, tr, th, td { display:block; }
      thead{display:none;}
      tr{padding: 14px 14px; border-bottom:1px solid var(--line);}
      tr:last-child{border-bottom:0;}
      td{border-bottom:0; padding: 7px 0;}
      td::before { display:block; color: var(--text-soft); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
      td:nth-child(1)::before { content: 'Fecha'; }
      td:nth-child(2)::before { content: 'Tema'; }
      td:nth-child(3)::before { content: 'Plataforma'; }
      td:nth-child(4)::before { content: 'Resumen'; }
      td:nth-child(5)::before { content: 'Link'; }
      td:nth-child(6)::before { content: 'Detalle'; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <p class="eyebrow">Biblioteca personal</p>
        <h1>Dashboard de contenidos</h1>
        <p class="subtitle">Links compartidos por Miguel, resumidos y filtrables por fecha, tema y plataforma.</p>
      </div>
      <a class="sheet-btn" href="https://docs.google.com/spreadsheets/d/1yQ4FFj60Kku7YiFvAnvbdOz8FuK-MPIVAOWNUgYV1eM/edit" target="_blank" rel="noopener">Abrir Google Sheet ↗</a>
    </header>

    <main class="panel">
      <div class="filters">
        <input id="q" placeholder="Buscar texto…" />
        <select id="tema"><option value="">Todos los temas</option></select>
        <select id="plataforma"><option value="">Todas las plataformas</option></select>
        <input id="desde" type="date" />
        <input id="hasta" type="date" />
      </div>
      <div class="status-row"><div id="status" class="muted">Cargando…</div></div>
      <div class="table-card">
        <table id="tabla" hidden>
          <thead>
            <tr><th>Fecha</th><th>Tema</th><th>Plataforma</th><th>Resumen corto</th><th>Link</th><th>Detalle</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const DEFAULT_CSV_URL = 'https://docs.google.com/spreadsheets/d/1yQ4FFj60Kku7YiFvAnvbdOz8FuK-MPIVAOWNUgYV1eM/gviz/tq?tqx=out:csv&sheet=Contenidos';
    const CSV_URL = new URLSearchParams(location.search).get('csv') || DEFAULT_CSV_URL;
    const HEADERS = ['Fecha de envío','Plataforma','Tema','Resumen corto','Resumen largo','Link original','Estado de extracción','Notas / observaciones'];
    let rows = [];

    function parseCSV(text) {
      const out = []; let row = [], cell = '', q = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i+1];
        if (q && c === '"' && n === '"') { cell += '"'; i++; }
        else if (c === '"') q = !q;
        else if (!q && c === ',') { row.push(cell); cell=''; }
        else if (!q && (c === '\n' || c === '\r')) { if (cell || row.length) { row.push(cell); out.push(row); row=[]; cell=''; } if (c === '\r' && n === '\n') i++; }
        else cell += c;
      }
      if (cell || row.length) { row.push(cell); }
      if (row.length) out.push(row);
      return out;
    }
    function normalize(parsed) {
      const header = parsed[0] || [];
      return parsed.slice(1).filter(r => r.some(Boolean)).map(r => Object.fromEntries(HEADERS.map(h => [h, r[header.indexOf(h)] || ''])));
    }
    function unique(key) { return [...new Set(rows.map(r => r[key]).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }
    function fillSelect(id, vals) { const el=document.getElementById(id); vals.forEach(v=>{ const o=document.createElement('option'); o.value=o.textContent=v; el.appendChild(o); }); }
    function dateOnly(v) { return (v || '').slice(0,10); }
    function esc(v) { return String(v || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    function safeUrl(v) { try { const u = new URL(v); return ['http:', 'https:'].includes(u.protocol) ? u.href : '#'; } catch { return '#'; } }
    function render() {
      const q = document.getElementById('q').value.toLowerCase();
      const tema = document.getElementById('tema').value;
      const plataforma = document.getElementById('plataforma').value;
      const desde = document.getElementById('desde').value;
      const hasta = document.getElementById('hasta').value;
      const filtered = rows.filter(r => {
        const blob = Object.values(r).join(' ').toLowerCase();
        const d = dateOnly(r['Fecha de envío']);
        return (!q || blob.includes(q)) && (!tema || r.Tema === tema) && (!plataforma || r.Plataforma === plataforma) && (!desde || d >= desde) && (!hasta || d <= hasta);
      });
      const tbody = document.querySelector('tbody'); tbody.innerHTML='';
      filtered.forEach(r => {
        const tr=document.createElement('tr');
        const link = safeUrl(r['Link original']);
        tr.innerHTML = `<td>${esc(r['Fecha de envío'])}</td><td><span class="badge">${esc(r.Tema)}</span></td><td><span class="platform">${esc(r.Plataforma)}</span></td><td>${esc(r['Resumen corto'])}</td><td><a href="${esc(link)}" target="_blank" rel="noopener">Abrir ↗</a></td><td><details><summary>Ver detalle</summary><p>${esc(r['Resumen largo'])}</p><p class="muted">Estado: ${esc(r['Estado de extracción'])}<br>${esc(r['Notas / observaciones'])}</p></details></td>`;
        tbody.appendChild(tr);
      });
      document.getElementById('status').textContent = `${filtered.length} contenido(s)`;
      document.getElementById('tabla').hidden = false;
    }
    async function main() {
      const res = await fetch(CSV_URL); const text = await res.text(); rows = normalize(parseCSV(text));
      fillSelect('tema', unique('Tema')); fillSelect('plataforma', unique('Plataforma'));
      ['q','tema','plataforma','desde','hasta'].forEach(id => document.getElementById(id).addEventListener('input', render));
      render();
    }
    main().catch(e => document.getElementById('status').textContent = 'Error cargando datos: ' + e.message);
  </script>
</body>
</html>
